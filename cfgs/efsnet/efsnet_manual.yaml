DATA_CONFIG:
    DATA_INFOS:
        -   DATASET: ManualDataset
            DATA_SPLIT: {
                TRAINING: './data/manual/zed_file_train.txt',
                EVALUATING: './data/manual/zed_file_val.txt',
                TESTING: ''
            }
            DATA_PATH: './data/manual/dataset'
            RETURN_RIGHT_DISP: false

        # -   DATASET: ManualDataset
        #     DATA_SPLIT: {
        #         TRAINING: './data/manual/zed_file_pertama_train.txt',
        #         EVALUATING: './data/manual/zed_file_pertama_val.txt',
        #         TESTING: ''
        #     }
        #     DATA_PATH: './data/manual/dataset_pertama'
        #     RETURN_RIGHT_DISP: false
        # -   DATASET: KittiDataset
        #     DATA_SPLIT: {
        #         TRAINING: './data/KITTI15/kitti15_train200.txt',
        #         EVALUATING: './data/KITTI15/kitti15_val20.txt',
        #         TESTING: ''
        #     }
        #     DATA_PATH: ./data/KITTI15/kitti15
        #     RETURN_RIGHT_DISP: true

    DATA_TRANSFORM:
        TRAINING:
            - { NAME: RightTopPad, SIZE: [ 384, 672 ] }
            - { NAME: StereoColorJitter, BRIGHTNESS: [ 0.7, 1.3 ], CONTRAST: [ 0.7, 1.3 ], SATURATION: [ 0.7, 1.3 ], HUE: 0.3, ASYMMETRIC_PROB: 0 }
            - { NAME: RandomErase, PROB: 0.5, MAX_TIME: 2, BOUNDS: [ 25, 50 ] }
            # - { NAME: RandomSparseScale, SIZE: [ 320, 736 ], MIN_SCALE: 0.2, MAX_SCALE: 0.5, SCALE_PROB: 0.8 }
            # - { NAME: RandomCrop, SIZE: [ 320, 736 ] }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }
            - { NAME: NormalizeImage, MEAN: [ 0.485, 0.456, 0.406 ], STD: [ 0.229, 0.224, 0.225 ] }
        EVALUATING:
            - { NAME: RightTopPad, SIZE: [ 384, 672 ] }
            - { NAME: TransposeImage }
            - { NAME: ToTensor }
            - { NAME: NormalizeImage, MEAN: [ 0.485, 0.456, 0.406 ], STD: [ 0.229, 0.224, 0.225 ] }

MODEL:
    NAME: EFSNet
    MAX_DISP: 192
    EXPANSE_RATIO: 4
    AGGREGATION_BLOCKS: [ 4, 4, 2 ] # Standard EFSNet repeat counts.
    LEFT_ATT: true
    FIND_UNUSED_PARAMETERS: false
    CKPT: -1
    PRETRAINED_MODEL: ''


OPTIMIZATION:
    FREEZE_BN: false
    SYNC_BN: true
    AMP: true
    BATCH_SIZE_PER_GPU: 2
    NUM_EPOCHS: 500

    OPTIMIZER:
        NAME: AdamW
        LR: &lr 0.0002
        WEIGHT_DECAY: 1.0e-05
        EPS: 1.0e-08

    SCHEDULER:
        NAME: OneCycleLR
        MAX_LR: *lr
        PCT_START: 0.01
        ON_EPOCH: False

    CLIP_GRAD:
        TYPE: value
        CLIP_VALUE: 0.1

EVALUATOR:
    BATCH_SIZE_PER_GPU: 1
    MAX_DISP: 192
    METRIC:
        - d1_all
        - epe
        - thres_1
        - thres_2
        - thres_3

TRAINER:
    EVAL_INTERVAL: 5
    CKPT_SAVE_INTERVAL: 1
    MAX_CKPT_SAVE_NUM: 10
    LOGGER_ITER_INTERVAL: 10
    TRAIN_VISUALIZATION: False
    EVAL_VISUALIZATION: False
